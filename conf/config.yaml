defaults:
  - world@simulation.world: default
  - load@simulation.load: default
  - obstacle@simulation.obstacle: default
  - plot@simulation.plot: default
  - random_movement@simulation.random_movement: default
  - link_layer@simulation.link_layer: default
  - fronthaul@simulation.fronthaul: default
  - backhaul@simulation.backhaul: default
  - uav_battery@simulation.uav_battery: default
  - metrics: default
  - _self_

scenario_name: city_of_the_sun
time_step: 1.0
total_steps: 1000

simulation:
  seed: 33

